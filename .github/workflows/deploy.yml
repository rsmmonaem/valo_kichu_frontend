name: Auto Deploy to CyberPanel (Docker + Next.js)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='node_modules' --exclude='.git' --exclude='.next' --exclude='.github'
          path: ./
          remote_path: /home/valokichu.com/public_html/frontend/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rebuild & Restart Docker on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/valokichu.com/public_html/frontend
            docker compose down
            docker compose up -d --build
            echo "✅ Deploy complete!"